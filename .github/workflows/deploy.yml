name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel a running deploy

jobs:
  # ─── Re-run CI checks before deploying ───────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    # We call the reusable ci.yml jobs inline so deploy.yml always runs them
    # before deploying. Alternatively use `needs:` if ci.yml ran on the same SHA.

  # ─── Backend deploy (ECS) ────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # OIDC
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        run: |
          npm ci
          npm run build
        working-directory: backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="${ECR_REGISTRY}/nakama-tictactoe"
          docker build \
            --platform linux/amd64 \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            -t "${IMAGE}:${IMAGE_TAG}" \
            -t "${IMAGE}:latest" \
            -f backend/Dockerfile \
            backend/
          docker push "${IMAGE}:${IMAGE_TAG}"
          docker push "${IMAGE}:latest"
          echo "Pushed: ${IMAGE}:${IMAGE_TAG}"

      - name: Update ECS service
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --output json | jq -r '.service.deployments[0] | "Status: \(.status) | Tasks: \(.runningCount)/\(.desiredCount)"'

      - name: Wait for deployment to stabilize
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          echo "Waiting for ECS service to stabilize (up to 10 minutes)…"
          aws ecs wait services-stable \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
          echo "✅ ECS service is stable."

      - name: Set GitHub deployment failed on error
        if: failure()
        run: |
          echo "::error::Backend deployment failed for ${GITHUB_SHA}"
          exit 1

  # ─── Frontend deploy (Vercel) ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token="${VERCEL_TOKEN}"
        working-directory: frontend

      - name: Build for production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel build --prod --token="${VERCEL_TOKEN}"
        working-directory: frontend

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Frontend deployed: ${URL}"
        working-directory: frontend

  # ─── Notify ───────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Report results
        env:
          BACKEND_STATUS: ${{ needs.deploy-backend.result }}
          FRONTEND_STATUS: ${{ needs.deploy-frontend.result }}
          BACKEND_TAG: ${{ needs.deploy-backend.outputs.image_tag }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
        run: |
          echo "══════════════════════════════════════"
          echo " Deployment Summary — ${GITHUB_SHA::8}"
          echo "══════════════════════════════════════"
          echo " Backend (ECS):  ${BACKEND_STATUS} | tag: ${BACKEND_TAG}"
          echo " Frontend (Vercel): ${FRONTEND_STATUS} | url: ${FRONTEND_URL}"
          echo "══════════════════════════════════════"

          if [[ "${BACKEND_STATUS}" != "success" || "${FRONTEND_STATUS}" != "success" ]]; then
            echo "::error::One or more deployments failed."
            exit 1
          fi
